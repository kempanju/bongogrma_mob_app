name: habarisasa_flutter
description: "Habari Sasa - News and Social Media App"
publish_to: 'none'

version: 1.3.1+5

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^14.2.0
  
  # Networking
  dio: ^5.4.3+1
  
  # Image Loading
  cached_network_image: ^3.3.1
  
  # WebView for HTML content
  webview_flutter: ^4.8.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  
  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.2
  firebase_analytics: ^11.1.0
  firebase_remote_config: ^5.0.2
  firebase_dynamic_links: ^6.0.2
  chopper: ^8.0.0
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.1.0
  connectivity_plus: ^7.0.0
  injectable: ^2.4.1
  freezed_annotation: ^3.1.0

  # Google Ads
  google_mobile_ads: ^5.1.0
  
  # Video Player
  video_player: ^2.8.7
  chewie: ^1.8.1
  
  # UI Components
  flutter_html: ^3.0.0-beta.2
  shimmer: ^3.0.0
  badges: ^3.1.2
  
  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.6
  share_plus: ^12.0.1
  timeago: ^3.6.1
  get_it: ^9.2.1
  easy_localization: ^3.0.8
  logger: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  chopper_generator: ^8.0.0
  injectable_generator: ^2.6.2
  json_serializable: ^6.10.0
  auto_route_generator: ^10.3.0
  freezed: ^3.2.3
  build_runner: ^2.4.13

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
